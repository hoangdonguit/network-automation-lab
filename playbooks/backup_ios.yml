---
- name: Backup Cisco Router Configs
  hosts: cisco_routers
  gather_facts: false
  vars:
    # Tự động trỏ vào thư mục backups/Tên_Router
    backup_dir: "../backups/{{ inventory_hostname }}"
    # Tự động lấy giờ hệ thống (VD: 20260320_193000)
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    
  tasks:
    - name: Create backup directory per router
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Collect running-config and interfaces
      cisco.ios.ios_command:
        commands:
          - show running-config
          - show ip interface brief
      register: output

    - name: Save running-config
      copy:
        content: "{{ output.stdout[0] }}"
        dest: "{{ backup_dir }}/running-config_{{ timestamp }}.txt"
      delegate_to: localhost

    - name: Save interface summary
      copy:
        content: "{{ output.stdout[1] }}"
        dest: "{{ backup_dir }}/interfaces_{{ timestamp }}.txt"
      delegate_to: localhost

    - name: Done
      debug:
        msg: "✅ Backed up {{ inventory_hostname }} successfully to backups/{{ inventory_hostname }}/"