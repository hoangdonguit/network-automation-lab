name: CI — Lint & Syntax Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Ansible Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Create dummy inventory for syntax check
        run: |
          mkdir -p inventory
          cat > inventory/hosts.yml << 'EOF'
          all:
            children:
              cisco_routers:
                hosts:
                  R1:
                    ansible_host: 172.17.0.11
                  R2:
                    ansible_host: 10.0.0.2
                  R3:
                    ansible_host: 10.0.0.6
                vars:
                  ansible_user: admin
                  ansible_password: dummy_password
                  ansible_connection: network_cli
                  ansible_network_os: ios
                  ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Syntax check playbook
        # Đã cập nhật lại thành file site.yml
        run: |
          ansible-playbook -i inventory/hosts.yml site.yml --syntax-check

      - name: Verify repo structure
        # Đã cập nhật để kiểm tra cấu trúc Roles mới
        run: |
          echo "=== Checking required files & folders ==="
          test -f ansible.cfg              && echo "OK ansible.cfg"
          test -f site.yml                 && echo "OK site.yml"
          test -d roles/base               && echo "OK roles/base"
          test -d roles/routing            && echo "OK roles/routing"
          test -d roles/validation         && echo "OK roles/validation"
          test -d roles/backup             && echo "OK roles/backup"
          echo "=== All checks passed ==="